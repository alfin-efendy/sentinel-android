name: CD

# Triggered only after CI workflow completes successfully on main.
# This ensures all jobs (unit tests + all emulator matrix) have passed
# before a release is attempted.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ── Stage 1: Semantic Release ─────────────────────────────────────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only run when CI passed AND the triggering commit is not a release commit
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]')
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new_release_published }}
      new-release-version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install semantic-release plugins
        run: |
          npm install --save-dev \
            semantic-release@24 \
            @semantic-release/commit-analyzer@13 \
            @semantic-release/release-notes-generator@14 \
            @semantic-release/changelog@6 \
            @semantic-release/exec@6 \
            @semantic-release/github@10 \
            @semantic-release/git@10

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: npx semantic-release

      # npx semantic-release does not write to $GITHUB_OUTPUT automatically.
      # Detect the new tag by comparing git tags before and after the run.
      - name: Detect new release
        id: semantic
        run: |
          git fetch --tags
          NEW_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "")
          if [ -n "$NEW_TAG" ]; then
            echo "new_release_published=true"       >> "$GITHUB_OUTPUT"
            echo "new_release_version=${NEW_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
            echo "new_release_version="        >> "$GITHUB_OUTPUT"
          fi

  # ── Stage 2: Build & upload release APK ──────────────────────────────────────
  build-release-apk:
    name: Build Release APK
    needs: release
    if: needs.release.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.new-release-version }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Copy CI Gradle properties
        run: cp .github/ci-gradle.properties gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Sign APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          VERSION="${{ needs.release.outputs.new-release-version }}"
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED="sentinel-${VERSION}.apk"
          # Use the latest available apksigner from the Android SDK
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort -V | tail -1)
          "$APKSIGNER" sign \
            --ks keystore.jks \
            --ks-pass "pass:${KEYSTORE_PASSWORD}" \
            --ks-key-alias "${KEY_ALIAS}" \
            --key-pass "pass:${KEYSTORE_PASSWORD}" \
            --out "$SIGNED" \
            "$UNSIGNED"
          # Verify the signature
          "$APKSIGNER" verify "$SIGNED"

      - name: Upload APK to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release.outputs.new-release-version }}"
          gh release upload "v${VERSION}" \
            "sentinel-${VERSION}.apk" \
            --clobber
